<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karmic Matrix - Account Deletion</title>
  <script src="https://cdn.jsdelivr.net/npm/backendless@5.2.0/dist/backendless.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-main: #0b0a14;
      --bg-secondary: #151223;
      --panel: rgba(255, 255, 255, 0.05);
      --panel-strong: rgba(255, 255, 255, 0.08);
      --text-main: #e7e2f2;
      --text-soft: #c9c1da;
      --text-dim: #a89fbc;
      --gold: #e0b36a;
      --gold-strong: #f0c98a;
      --gold-shadow: rgba(224, 179, 106, 0.28);
      --border: rgba(255, 255, 255, 0.10);
      --border-soft: rgba(255, 255, 255, 0.07);
      --success: #9be28c;
      --error: #ffb8b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top, #1a1530 0%, #100d1d 35%, #0b0a14 72%);
      color: var(--text-main);
      min-height: 100vh;
      text-align: center;
      line-height: 1.6;
      padding: 28px 20px 40px;
    }

    .page-wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .top-brand {
      margin-bottom: 24px;
    }

    .top-brand img {
      height: 72px;
      opacity: 0.95;
      display: block;
      margin: 0 auto;
    }

    .lang-buttons {
      margin: 0 auto 26px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .lang-buttons button {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      color: var(--text-soft);
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.25s ease;
      min-width: 120px;
    }

    .lang-buttons button:hover,
    .lang-buttons button:focus {
      border-color: rgba(224, 179, 106, 0.5);
      color: #ffffff;
      box-shadow: 0 0 12px rgba(224, 179, 106, 0.12);
      outline: none;
    }

    .container {
      position: relative;
      max-width: 560px;
      margin: 0 auto;
      padding: 38px 34px 34px;
      border-radius: 20px;
      background: var(--panel);
      border: 1px solid var(--border-soft);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .container::before {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(224, 179, 106, 0.16) 0%,
        rgba(170, 120, 255, 0.10) 38%,
        rgba(90, 70, 160, 0.07) 58%,
        transparent 76%
      );
      filter: blur(24px);
      top: -110px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 24px var(--gold-shadow);
      margin-bottom: 14px;
      line-height: 1.25;
    }

    .subtitle {
      font-size: 1.02rem;
      color: var(--text-soft);
      max-width: 430px;
      margin: 0 auto 28px;
      line-height: 1.8;
    }

    .warning-box {
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      padding: 14px 16px;
      color: var(--text-dim);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .field {
      width: 100%;
      max-width: 360px;
      margin: 0 auto 14px;
      display: block;
    }

    input {
      width: 100%;
      padding: 13px 15px;
      font-size: 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input::placeholder {
      color: var(--text-dim);
    }

    input:focus {
      outline: none;
      border-color: rgba(224, 179, 106, 0.45);
      box-shadow: 0 0 0 3px rgba(224, 179, 106, 0.08);
      background: rgba(255, 255, 255, 0.05);
    }

    .delete-btn {
      width: 100%;
      max-width: 360px;
      padding: 14px 18px;
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #1c1430;
      background: linear-gradient(145deg, var(--gold), var(--gold-strong));
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(224, 179, 106, 0.34);
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      margin-top: 8px;
      font-family: 'Inter', sans-serif;
    }

    .delete-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 10px 24px rgba(224, 179, 106, 0.42);
      filter: brightness(1.03);
    }

    .helper-text {
      margin-top: 18px;
      color: var(--text-dim);
      font-size: 0.92rem;
      line-height: 1.7;
    }

    #result {
      margin-top: 20px;
      min-height: 1.3em;
      font-weight: 600;
      font-size: 0.98rem;
      color: var(--error);
      line-height: 1.7;
      word-break: break-word;
    }

    .footer-note {
      margin-top: 24px;
      color: var(--text-dim);
      font-size: 0.88rem;
    }

    @media (max-width: 640px) {
      body {
        padding: 22px 14px 30px;
      }

      .container {
        padding: 30px 20px 26px;
        border-radius: 18px;
      }

      h1 {
        font-size: 1.75rem;
      }

      .subtitle {
        font-size: 0.98rem;
      }

      .lang-buttons {
        gap: 10px;
      }

      .lang-buttons button {
        min-width: unset;
        padding: 10px 14px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="top-brand">
      <img src="images/matrix_logo.png" alt="Karmic Matrix Logo" />
    </div>

    <div class="lang-buttons" role="group" aria-label="Language selection">
      <button type="button" onclick="setLanguage('en')">English 🇬🇧</button>
      <button type="button" onclick="setLanguage('tr')">Türkçe 🇹🇷</button>
      <button type="button" onclick="setLanguage('ru')">Русский 🇷🇺</button>
    </div>

    <div class="container">
      <div class="content">
        <h1 id="title">Delete My Karmic Matrix Account</h1>
        <p class="subtitle" id="instruction">
          Enter your account credentials to permanently delete your account.
        </p>

        <div class="warning-box" id="warningText">
          This action is permanent and cannot be undone.
        </div>

        <div class="field">
          <input id="email" type="email" placeholder="Email" required />
        </div>

        <div class="field">
          <input id="password" type="password" placeholder="Password" required />
        </div>

        <button class="delete-btn" onclick="confirmAndDelete()" id="deleteButton">
          Delete My Account
        </button>

        <p class="helper-text" id="helperText">
          This page is intended for users who created an account in the Android version of the app.
        </p>

        <p id="result"></p>

        <p class="footer-note" id="footerNote">
          If you need help, please contact apps@d4dstudio.net
        </p>
      </div>
    </div>
  </div>

<script>
  const langTexts = {
    en: {
      title: "Delete My Karmic Matrix Account",
      instruction: "Enter your account credentials to permanently delete your account.",
      warningText: "This action is permanent and cannot be undone.",
      deleteButton: "Delete My Account",
      helperText: "This page is intended for users who created an account in the Android version of the app.",
      footerNote: "If you need help, please contact apps@d4dstudio.net",
      emailPlaceholder: "Email",
      passwordPlaceholder: "Password",
      confirmationMessage: "Are you sure you want to permanently delete your account? This action cannot be undone.",
      successMessage: "✅ Your account has been permanently deleted.",
      errorMessage: "❌ Error: Something went wrong, please try again.",
      missingFields: "Please enter your email and password."
    },
    tr: {
      title: "Karmik Matris Hesabımı Sil",
      instruction: "Hesabınızı kalıcı olarak silmek için hesap bilgilerinizi girin.",
      warningText: "Bu işlem kalıcıdır ve geri alınamaz.",
      deleteButton: "Hesabımı Sil",
      helperText: "Bu sayfa, uygulamanın Android sürümünde hesap oluşturmuş kullanıcılar içindir.",
      footerNote: "Yardıma ihtiyacınız varsa apps@d4dstudio.net adresiyle iletişime geçin",
      emailPlaceholder: "E-posta",
      passwordPlaceholder: "Parola",
      confirmationMessage: "Hesabınızı kalıcı olarak silmek istediğinizden emin misiniz? Bu işlem geri alınamaz.",
      successMessage: "✅ Hesabınız kalıcı olarak silindi.",
      errorMessage: "❌ Hata: Bir şeyler yanlış gitti, lütfen tekrar deneyin.",
      missingFields: "Lütfen e-posta ve parolanızı girin."
    },
    ru: {
  title: "Удалить мой аккаунт Кармической Матрицы",
  instruction: "Введите данные своей учетной записи, чтобы навсегда удалить аккаунт Кармической Матрицы.",
  warningText: "Это действие является окончательным и не может быть отменено.",
  deleteButton: "Удалить мой аккаунт",
  helperText: "Эта страница предназначена для пользователей, создавших аккаунт в Android-версии приложения.",
  footerNote: "Если вам нужна помощь, свяжитесь с нами: apps@d4dstudio.net",
  emailPlaceholder: "Эл. почта",
  passwordPlaceholder: "Пароль",
  confirmationMessage: "Вы уверены, что хотите удалить свою учетную запись навсегда? Это действие нельзя отменить.",
  successMessage: "✅ Ваша учетная запись была удалена навсегда.",
  errorMessage: "❌ Ошибка: Что-то пошло не так, пожалуйста, попробуйте еще раз.",
  missingFields: "Пожалуйста, введите эл. почту и пароль."
}
  };

  let currentLang = "en";
  let backendlessReady = false;

  function setLanguage(lang) {
    currentLang = lang;
    updateTexts();
  }

  function updateTexts() {
    const t = langTexts[currentLang];
    document.getElementById("title").innerText = t.title;
    document.getElementById("instruction").innerText = t.instruction;
    document.getElementById("warningText").innerText = t.warningText;
    document.getElementById("deleteButton").innerText = t.deleteButton;
    document.getElementById("helperText").innerText = t.helperText;
    document.getElementById("footerNote").innerText = t.footerNote;
    document.getElementById("email").placeholder = t.emailPlaceholder;
    document.getElementById("password").placeholder = t.passwordPlaceholder;
    document.getElementById("result").innerText = "";
    document.getElementById("result").style.color = "#ffb8b8";
  }

  function initBackendless() {
    try {
      if (typeof Backendless !== "undefined") {
        Backendless.initApp(
          "D7E523CE-A8B6-4C60-B8A9-22147E9F3237",
          "F2E77402-CFCD-4C18-BAA8-35046CD5963B"
        );
        backendlessReady = true;
      } else {
        console.error("Backendless script could not be loaded.");
      }
    } catch (err) {
      console.error("Backendless init error:", err);
    }
  }

  async function confirmAndDelete() {
    const confirmed = confirm(langTexts[currentLang].confirmationMessage);
    if (!confirmed) return;
    await deleteAccount();
  }

  async function deleteAccount() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const resultElement = document.getElementById("result");
    const t = langTexts[currentLang];

    if (!email || !password) {
      resultElement.style.color = "#ffb8b8";
      resultElement.innerText = `${t.errorMessage} ${t.missingFields}`;
      return;
    }

    if (!backendlessReady) {
      resultElement.style.color = "#ffb8b8";
      resultElement.innerText = t.errorMessage + " Backendless is not available.";
      return;
    }

    try {
      const user = await Backendless.UserService.login(email, password, true);
      await Backendless.Data.of("Users").remove(user.objectId);
      resultElement.style.color = "#9be28c";
      resultElement.innerText = t.successMessage;
    } catch (err) {
      resultElement.style.color = "#ffb8b8";
      resultElement.innerText = `${t.errorMessage} ${err.message}`;
    }
  }

  updateTexts();
  initBackendless();
</script>
</body>
</html>
